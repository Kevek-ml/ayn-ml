site_name: ayn-ml
site_description: ML monitoring for tabular, LLM, and agent systems — in one library.
site_url: https://kevek-ml.github.io/ayn-ml/
repo_url: https://github.com/Kevek-ml/ayn-ml
repo_name: Kevek-ml/ayn-ml
copyright: Copyright &copy; 2026 Kevek ML — Apache 2.0 License

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            unwrap_annotated: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Guide:
    - Schemas: schemas.md
    - Metrics: metrics.md
    - Metric Advisor: advisor.md
    - Data Layer: data-layer.md
    - Stores: stores.md
    - Architecture: architecture.md
  - Pro:
    - Overview: pro.md
    - Explain (SHAP + LLM): explain.md
    - Cloud Runner: runner.md
    - Sinks (Slack): sinks.md
  - API Reference:
    - Overview: api/index.md
    - Core: api/core.md
    - Metrics: api/metrics.md
    - Advisor: api/advisor.md
    - Runner: api/runner.md
    - Data: api/data.md
    - Stores: api/stores.md
    - Sinks: api/sinks.md
    - Renderers: api/renderers.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kevek-ml/ayn-ml
      name: ayn-ml on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ayn-ml/
      name: ayn-ml on PyPI
