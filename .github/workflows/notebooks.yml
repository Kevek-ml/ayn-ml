name: Notebooks

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "ayn_ml/**"
      - "pyproject.toml"
      - ".github/workflows/notebooks.yml"
  pull_request:
    paths:
      - "examples/**"
      - "ayn_ml/**"
      - "pyproject.toml"
      - ".github/workflows/notebooks.yml"

jobs:
  execute:
    name: Execute all example notebooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[all]" nbconvert ipykernel

      - name: Execute notebooks
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=120 \
            --ExecutePreprocessor.kernel_name=python3 \
            examples/*.ipynb
